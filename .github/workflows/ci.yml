name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend — lint + unit tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flashstudy_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/flashstudy_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-for-testing-only-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-for-testing-only-32chars
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Aplicar migrations no banco de teste
        run: npx prisma migrate deploy

      - name: Executar testes unitários com cobertura
        run: ./node_modules/.bin/jest --testPathPatterns="tests/unit" --coverage --coverageReporters=text --forceExit

      - name: Executar testes de integração
        run: ./node_modules/.bin/jest --testPathPatterns="tests/integration" --forceExit

  lint:
    name: Backend — ESLint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint
